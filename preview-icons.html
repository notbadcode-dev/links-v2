<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Preview iconos</title>
  <style>
    body { background: #1a1a2e; display: flex; gap: 48px; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .icon { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #7c6af7; }
    .icon span { color: #aaa; font-family: monospace; font-size: 12px; }
    svg { width: 64px; height: 64px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" onclick="this.querySelectorAll('animate,animateTransform').forEach(a=>{a.beginElement()})">
      <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path fill="currentColor" fill-opacity="0" stroke-dasharray="60" d="M3 12c0 -4.97 4.03 -9 9 -9c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9Z">
          <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="60;0"/>
          <animate fill="freeze" attributeName="fill-opacity" begin="0.6s" dur="0.15s" to="0.3"/>
        </path>
        <path fill="none" stroke-dasharray="14" stroke-dashoffset="14" d="M8 12l3 3l5 -5">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.85s" dur="0.2s" to="0"/>
        </path>
      </g>
    </svg>
    <span>check</span>
  </div>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" onclick="this.querySelectorAll('animate,animateTransform').forEach(a=>{a.beginElement()})">
      <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path fill="currentColor" fill-opacity="0" stroke-dasharray="60" d="M3 12c0 -4.97 4.03 -9 9 -9c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9Z">
          <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="60;0"/>
          <animate fill="freeze" attributeName="fill-opacity" begin="0.6s" dur="0.15s" to="0.3"/>
        </path>
        <path fill="none" stroke-dasharray="8" stroke-dashoffset="8" d="M12 12l4 4M12 12l-4 -4M12 12l-4 4M12 12l4 -4">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.85s" dur="0.2s" to="0"/>
        </path>
      </g>
    </svg>
    <span>error</span>
  </div>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" onclick="this.querySelectorAll('animate,animateTransform').forEach(a=>{a.beginElement()})">
      <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path fill="currentColor" fill-opacity="0" stroke-dasharray="60" d="M3 12c0 -4.97 4.03 -9 9 -9c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9Z">
          <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="60;0"/>
          <animate fill="freeze" attributeName="fill-opacity" begin="0.6s" dur="0.15s" to="0.3"/>
        </path>
        <path fill="none" stroke-dasharray="5" stroke-dashoffset="5" d="M12 7v5">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.85s" dur="0.2s" to="0"/>
        </path>
        <path fill="none" stroke-dasharray="2" stroke-dashoffset="2" d="M12 16v.01">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="1.05s" dur="0.1s" to="0"/>
        </path>
      </g>
    </svg>
    <span>warning</span>
  </div>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" onclick="this.querySelectorAll('animate,animateTransform').forEach(a=>{a.beginElement()})">
      <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path fill="currentColor" fill-opacity="0" stroke-dasharray="60" d="M3 12c0 -4.97 4.03 -9 9 -9c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9Z">
          <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="60;0"/>
          <animate fill="freeze" attributeName="fill-opacity" begin="0.6s" dur="0.15s" to="0.3"/>
        </path>
        <path fill="none" stroke-dasharray="2" stroke-dashoffset="2" d="M12 8v.01">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.85s" dur="0.1s" to="0"/>
        </path>
        <path fill="none" stroke-dasharray="5" stroke-dashoffset="5" d="M12 11v5">
          <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.95s" dur="0.2s" to="0"/>
        </path>
      </g>
    </svg>
    <span>info</span>
  </div>

  <p style="position:fixed;bottom:16px;color:#555;font-family:monospace;font-size:11px">haz click en un icono para repetir la animación</p>
</body>
</html>
