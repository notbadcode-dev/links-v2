<ng-container *i18n="let t">
  <div class="layout-wrapper">
    <aside class="right-sidebar">
      <div class="sidebar-content">
        <header class="sidebar-header">
          <h3>Activity</h3>
        </header>
        <div class="sidebar-items">
          <p class="empty-state">No recent activity</p>
        </div>

        <div class="sidebar-user">
          <div class="sidebar-user-row">
            <mat-icon class="sidebar-user-icon" [svgIcon]="icons.AUTH.USER_SIDEBAR" />
            <span class="sidebar-user-email">{{ activeEmail() }}</span>
          </div>

          <button-wrapper
            class="sidebar-logout-button"
            [title]="t('common.actions.logout')"
            [tooltip]="t(logoutTooltipKey)"
            [svgIcon]="icons.AUTH.LOGOUT_BUTTON"
            [fullWidth]="true"
            [variant]="EButtonWrapperVariant.FLAT"
            (clicked)="onLogout()"
          />
        </div>
      </div>
    </aside>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</ng-container>
