<icon-wrapper class="notification-toast__icon" [icon]="icon()" aria-hidden="true" />
<span class="notification-toast__message">{{ notification().message }}</span>
<button
  type="button"
  class="notification-toast__close"
  [attr.aria-label]="'Dismiss notification'"
  (click)="onDismiss()"
>
  <icon-wrapper icon="close" aria-hidden="true" />
</button>
