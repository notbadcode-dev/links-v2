@switch (variant()) {
  @case (EButtonWrapperVariant.FLAT) {
    <button
      mat-flat-button
      [buttonWrapperBase]="this"
      [color]="color()"
      [matTooltip]="effectiveTooltip()"
      [attr.aria-label]="ariaLabel()"
    >
      <ng-container *ngTemplateOutlet="buttonInner" />
    </button>
  }
  @case (EButtonWrapperVariant.STROKED) {
    <button
      mat-stroked-button
      [buttonWrapperBase]="this"
      [color]="color()"
      [matTooltip]="effectiveTooltip()"
      [attr.aria-label]="ariaLabel()"
    >
      <ng-container *ngTemplateOutlet="buttonInner" />
    </button>
  }
  @case (EButtonWrapperVariant.BASIC) {
    <button
      mat-button
      [buttonWrapperBase]="this"
      [color]="color()"
      [matTooltip]="effectiveTooltip()"
      [attr.aria-label]="ariaLabel()"
    >
      <ng-container *ngTemplateOutlet="buttonInner" />
    </button>
  }
  @default {
    <button
      mat-raised-button
      [buttonWrapperBase]="this"
      [color]="color()"
      [matTooltip]="effectiveTooltip()"
      [attr.aria-label]="ariaLabel()"
    >
      <ng-container *ngTemplateOutlet="buttonInner" />
    </button>
  }
}

<ng-template #buttonInner>
  <span class="button-wrapper__content" [class.button-wrapper__content--icon-only]="(icon() || svgIcon()) && !title()">
    @if (icon() || svgIcon()) {
      <icon-wrapper class="button-wrapper__icon" [icon]="icon()" [svgIcon]="svgIcon()" />
    }
    @if (title()) {
      <span class="button-wrapper__label">{{ title() }}</span>
    }
  </span>
</ng-template>
