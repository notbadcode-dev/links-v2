<mat-tree
  [dataSource]="dataSource()"
  [childrenAccessor]="childrenAccessor"
  [class]="rootClasses()"
  [attr.aria-label]="ariaLabel()"
>
  <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
    <span class="tree-toggle-spacer" aria-hidden="true"></span>
    <div
      class="node-content leaf"
      [class.node-content--selected]="isSelected(node)"
      [class.node-content--disabled]="node.disabled"
      (click)="onNodeClick(node)"
    >
      @if (node.icon) {
        <mat-icon class="node-icon">{{ node.icon }}</mat-icon>
      } @else {
        <div class="icon-placeholder"></div>
      }
      <span class="node-label">{{ node.label }}</span>
    </div>
  </mat-tree-node>

  <mat-nested-tree-node *matTreeNodeDef="let dataNode; when: hasChild" #node="matNestedTreeNode">
    <div class="mat-tree-node">
      <button
        mat-icon-button
        class="tree-toggle"
        matTreeNodeToggle
        type="button"
        [attr.aria-label]="'Toggle ' + dataNode.label"
        [attr.aria-expanded]="node.isExpanded"
        (click)="onNodeToggle(dataNode, node.isExpanded)"
      >
        <mat-icon class="mat-icon-rtl-mirror">{{ node.isExpanded ? expandedIcon() : collapsedIcon() }}</mat-icon>
      </button>
      <div
        class="node-content branch"
        [class.node-content--selected]="isSelected(dataNode)"
        [class.node-content--disabled]="dataNode.disabled"
        (click)="onNodeClick(dataNode)"
      >
        @if (dataNode.icon) {
          <mat-icon class="node-icon">{{ dataNode.icon }}</mat-icon>
        } @else {
          <div class="icon-placeholder"></div>
        }
        <span class="node-label">{{ dataNode.label }}</span>
      </div>
    </div>
    <div [class.tree-invisible]="!node.isExpanded" class="tree-group" role="group">
      <ng-container matTreeNodeOutlet />
    </div>
  </mat-nested-tree-node>
</mat-tree>
