<button
  mat-button
  [matMenuTriggerFor]="dropdownMenu"
  [matTooltip]="tooltip() ?? ''"
  [disabled]="disabled()"
  [class]="customClass()"
>
  <ng-content select="[slot=trigger]" />
</button>

<mat-menu
  #dropdownMenu="matMenu"
  [class]="'dropdown-wrapper-menu ' + menuClass()"
  [overlapTrigger]="false"
  [yPosition]="position() === EDropdownWrapperPosition.BELOW ? 'below' : 'above'"
>
  <ng-content select="[slot=content]" />
</mat-menu>
